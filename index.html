<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Project Dashboard</title>
<style>
  :root{
    --bg:#FAFAF8;
    --panel:#FFFFFF;
    --ink:#1C1C1A;
    --muted:#8A8A82;
    --border:#E6E4DD;
    --accent:#41566B;
    --accent-soft:#EAEEF1;
    --good:#5C7A5B;
    --good-soft:#EAF0E9;
    --warn:#B8863B;
    --warn-soft:#F6EEE0;
    --bad:#A2493F;
    --bad-soft:#F5E9E7;
    --hold:#7A7566;
    --hold-soft:#EFEDE6;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);}
  .app{display:grid;grid-template-columns:260px 1fr;min-height:100vh;}

  .sidebar{border-right:1px solid var(--border);padding:24px 16px;background:var(--panel);display:flex;flex-direction:column;}
  .brand{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:20px;font-weight:700;}
  .nav-btn{display:flex;align-items:center;gap:8px;width:100%;text-align:left;padding:9px 10px;border-radius:8px;border:1px solid transparent;background:none;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;margin-bottom:2px;}
  .nav-btn:hover{background:var(--bg);}
  .nav-btn.active{background:var(--accent-soft);color:var(--accent);}
  .divider{height:1px;background:var(--border);margin:14px 0;}
  .btn-new{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--accent-soft);color:var(--accent);font-weight:700;font-size:13px;cursor:pointer;margin-bottom:14px;}
  .btn-new:hover{background:#dde5ea;}
  .project-list{list-style:none;padding:0;margin:0;flex:1;overflow-y:auto;}
  .project-item{padding:11px 10px;border-radius:8px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;}
  .project-item:hover{background:var(--bg);}
  .project-item.active{background:var(--accent-soft);border-color:var(--accent);}
  .project-item .pname{font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:6px;}
  .project-item .pmeta{font-size:11px;color:var(--muted);margin-top:3px;padding-left:13px;}
  .status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .dot-good{background:var(--good);} .dot-warn{background:var(--warn);}
  .dot-bad{background:var(--bad);} .dot-plan{background:var(--accent);}
  .dot-hold{background:var(--hold);}
  .prio-flag{font-size:10px;font-weight:800;padding:1px 5px;border-radius:4px;}
  .prio-High{background:var(--bad-soft);color:var(--bad);}
  .prio-Medium{background:var(--warn-soft);color:var(--warn);}
  .prio-Low{background:var(--hold-soft);color:var(--hold);}

  .main{padding:32px 40px;overflow-y:auto;}
  .empty{color:var(--muted);font-size:14px;margin-top:80px;text-align:center;}

  .ov-header{margin-bottom:22px;}
  .ov-header h1{margin:0 0 4px 0;font-size:22px;}
  .ov-header .sub{color:var(--muted);font-size:13px;}
  .stat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:26px;}
  .chart-grid{display:grid;grid-template-columns:1.1fr 1fr 1fr;gap:14px;margin-bottom:26px;align-items:stretch;}
  .chart-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px 20px;}
  .chart-card h3{margin:0 0 4px 0;font-size:13px;font-weight:800;}
  .chart-card .chart-sub{font-size:11px;color:var(--muted);margin-bottom:14px;}
  .donut-wrap{display:flex;align-items:center;gap:18px;}
  .donut-legend{display:flex;flex-direction:column;gap:8px;flex:1;}
  .legend-row{display:flex;align-items:center;gap:8px;font-size:12px;}
  .legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .legend-name{flex:1;color:var(--ink);font-weight:600;}
  .legend-val{color:var(--muted);font-weight:700;}
  .bar-chart-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .bar-chart-row:last-child{margin-bottom:0;}
  .bar-label{width:64px;font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0;}
  .bar-track{flex:1;height:16px;background:var(--bg);border-radius:5px;overflow:hidden;border:1px solid var(--border);}
  .bar-fill{height:100%;border-radius:5px;}
  .bar-val{width:22px;text-align:right;font-size:12px;font-weight:800;flex-shrink:0;}
  .ring-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;}
  .ring-pct{font-size:24px;font-weight:800;}
  .ring-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
  .stat-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
  .stat-card .num{font-size:26px;font-weight:800;}
  .stat-card .lbl{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.03em;font-weight:600;}

  .filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .filters select{padding:7px 10px;border:1px solid var(--border);border-radius:7px;font-size:12px;background:var(--panel);color:var(--ink);}

  table.grid-table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  table.grid-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);padding:11px 14px;border-bottom:1px solid var(--border);font-weight:700;}
  table.grid-table td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
  table.grid-table tr:last-child td{border-bottom:none;}
  table.grid-table tr.rowclick{cursor:pointer;}
  table.grid-table tr.rowclick:hover{background:var(--bg);}
  .name-cell{font-weight:700;}
  .mini-track{width:90px;height:6px;background:var(--bg);border-radius:5px;overflow:hidden;border:1px solid var(--border);display:inline-block;vertical-align:middle;margin-right:8px;}
  .mini-fill{height:100%;background:var(--accent);}

  .badge{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;white-space:nowrap;}
  .badge-good{background:var(--good-soft);color:var(--good);}
  .badge-warn{background:var(--warn-soft);color:var(--warn);}
  .badge-bad{background:var(--bad-soft);color:var(--bad);}
  .badge-plan{background:var(--accent-soft);color:var(--accent);}
  .badge-hold{background:var(--hold-soft);color:var(--hold);}

  .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;gap:20px;}
  .header h1{font-size:22px;margin:0 0 6px 0;}
  .header .sub{color:var(--muted);font-size:13px;}
  .header-actions{display:flex;gap:8px;align-items:center;}
  .icon-btn{border:1px solid var(--border);background:var(--panel);border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer;color:var(--ink);font-weight:600;}
  .icon-btn:hover{background:var(--bg);}
  .icon-btn.danger{color:var(--bad);border-color:var(--bad-soft);}

  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px;}
  .card h3{margin:0 0 14px 0;font-size:14px;font-weight:800;}

  .progress-track{width:100%;height:8px;background:var(--bg);border-radius:6px;overflow:hidden;border:1px solid var(--border);}
  .progress-fill{height:100%;background:var(--accent);border-radius:6px;transition:width .25s;}
  .progress-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .progress-row .pct{font-size:13px;font-weight:800;min-width:38px;text-align:right;}

  .stage-list{display:flex;flex-direction:column;gap:8px;}
  .stage{display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);}
  .stage.done{border-color:var(--good);background:var(--good-soft);}
  .toggle{width:36px;height:20px;border-radius:20px;background:#D8D6CD;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;}
  .toggle.on{background:var(--good);}
  .toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 2px rgba(0,0,0,.2);}
  .toggle.on::after{left:18px;}
  .stage-name{font-size:13px;font-weight:500;flex:1;}
  .stage-name.done{text-decoration:line-through;color:var(--muted);}
  .stage-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;}
  .stage-del:hover{color:var(--bad);}
  .add-stage-row{display:flex;gap:8px;margin-top:10px;}
  .add-stage-row input{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px;background:var(--bg);}
  .add-stage-row button{padding:8px 12px;border:1px solid var(--border);border-radius:7px;background:var(--panel);font-size:12px;font-weight:700;cursor:pointer;}

  .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .field-grid.cols-3{grid-template-columns:1fr 1fr 1fr;}
  .field label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
  .field input, .field select, .field textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-family:inherit;font-size:13px;background:var(--bg);color:var(--ink);}
  .field textarea{resize:vertical;min-height:60px;}

  .prio-toggle{display:flex;gap:6px;}
  .prio-btn{flex:1;padding:8px 0;border-radius:7px;border:1px solid var(--border);background:var(--bg);font-size:12px;font-weight:700;cursor:pointer;color:var(--muted);}
  .prio-btn.sel-High.selected{background:var(--bad-soft);color:var(--bad);border-color:var(--bad);}
  .prio-btn.sel-Medium.selected{background:var(--warn-soft);color:var(--warn);border-color:var(--warn);}
  .prio-btn.sel-Low.selected{background:var(--hold-soft);color:var(--hold);border-color:var(--hold);}

  .mom-item{border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:12px;background:var(--bg);}
  .mom-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .mom-date{font-size:12px;font-weight:800;color:var(--accent);}
  .mom-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;}
  .mom-del:hover{color:var(--bad);}
  .mom-text{font-size:13px;white-space:pre-wrap;line-height:1.5;}

  .add-mom-form{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
  .add-mom-form textarea{min-height:70px;}
  .primary-btn{align-self:flex-start;padding:9px 16px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;}
  .primary-btn:hover{opacity:.9;}

  .modal-bg{position:fixed;inset:0;background:rgba(28,28,26,.4);display:none;align-items:center;justify-content:center;z-index:50;}
  .modal-bg.open{display:flex;}
  .modal{background:var(--panel);border-radius:14px;padding:24px;width:440px;max-width:90vw;border:1px solid var(--border);max-height:88vh;overflow-y:auto;}
  .modal h3{margin:0 0 16px 0;font-size:16px;}
  .modal .row{margin-bottom:12px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}
  .ghost-btn{background:none;border:1px solid var(--border);padding:8px 14px;border-radius:7px;font-size:12px;cursor:pointer;font-weight:600;}

  .empty-state{text-align:center;color:var(--muted);font-size:13px;padding:20px 0;}

  .tag-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--accent-soft);color:var(--accent);border:1px solid transparent;}
  .tag-chip.clickable{cursor:pointer;}
  .tag-chip.clickable:hover{background:#dde5ea;}
  .tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
  .no-tag{font-size:11px;color:var(--muted);font-style:italic;}

  .checkbox-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
  .chk-item{display:flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid var(--border);border-radius:20px;background:var(--bg);font-size:12px;cursor:pointer;user-select:none;}
  .chk-item input{margin:0;cursor:pointer;}
  .chk-item.checked{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);font-weight:700;}

  .mom-page-item{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:14px;}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="brand">Project Dashboard</div>
    <button class="nav-btn active" id="navOverview" onclick="showOverview()">📊 Overview</button>
    <button class="nav-btn" id="navMom" onclick="showMomPage()">📝 MoM</button>
    <div class="divider"></div>
    <button class="btn-new" onclick="openNewProjectModal()">+ Project Baru</button>
    <ul class="project-list" id="projectList"></ul>
  </div>
  <div class="main" id="mainPanel"></div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>Project Baru</h3>
    <div class="row field">
      <label>Nama Project</label>
      <input id="newProjName" placeholder="cth. AI League">
    </div>
    <div class="row field">
      <label>PIC / Owner</label>
      <input id="newProjOwner" placeholder="cth. Dinda">
    </div>
    <div class="field-grid row">
      <div class="field">
        <label>Tanggal Mulai</label>
        <input id="newProjStart" type="date">
      </div>
      <div class="field">
        <label>Target Selesai</label>
        <input id="newProjEnd" type="date">
      </div>
    </div>
    <div class="row field">
      <label>Priority</label>
      <div class="prio-toggle" id="newProjPrio">
        <button type="button" class="prio-btn sel-Low" data-val="Low" onclick="selectNewPrio('Low')">Low</button>
        <button type="button" class="prio-btn sel-Medium selected" data-val="Medium" onclick="selectNewPrio('Medium')">Medium</button>
        <button type="button" class="prio-btn sel-High" data-val="High" onclick="selectNewPrio('High')">High</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="ghost-btn" onclick="closeModal()">Batal</button>
      <button class="primary-btn" onclick="createProject()">Simpan</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_STAGES = ["Kickoff","Perencanaan","Eksekusi","Review / QA","Selesai"];
const STATUS_OPTS = ["Planning","On Progress","On Hold","Completed","Cancelled"];
let projects = [];
let moms = [];
let activeId = null;
let view = 'overview';
let newProjPrio = 'Medium';
let filters = { status:'', priority:'' };
let momFilterProject = '';
let momFormChecked = new Set();

function uid(prefix){ return (prefix||'p') + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

async function loadData(){
  try{
    const res = await window.storage.get('projects');
    projects = res ? JSON.parse(res.value) : [];
  }catch(e){ projects = []; }
  try{
    const res2 = await window.storage.get('moms');
    moms = res2 ? JSON.parse(res2.value) : [];
  }catch(e){ moms = []; }

  projects.forEach(p=>{
    if(!p.priority) p.priority = 'Medium';
    if(!p.status) p.status = 'Planning';
    // migrasi: pindahkan MoM lama yang nempel di project ke daftar global
    if(Array.isArray(p.moms) && p.moms.length){
      p.moms.forEach(m=>{
        moms.push({ id: m.id || uid('m'), date: m.date, text: m.text, projectIds: [p.id] });
      });
      delete p.moms;
    }
  });

  renderSidebar();
  showOverview();
  saveData();
}

async function saveData(){
  try{ await window.storage.set('projects', JSON.stringify(projects)); }
  catch(e){ console.error('gagal menyimpan projects', e); }
  try{ await window.storage.set('moms', JSON.stringify(moms)); }
  catch(e){ console.error('gagal menyimpan moms', e); }
}

function computeProgress(p){
  if(!p.stages.length) return 0;
  const done = p.stages.filter(s=>s.done).length;
  return Math.round((done / p.stages.length) * 100);
}

function statusInfo(p){
  const pct = computeProgress(p);
  if(p.status === 'Cancelled') return {label:'Cancelled', cls:'hold', dot:'hold'};
  if(p.status === 'On Hold') return {label:'On Hold', cls:'hold', dot:'hold'};
  if(pct === 100 || p.status === 'Completed') return {label:'Completed', cls:'good', dot:'good'};
  if(pct === 0) return {label:'Planning', cls:'plan', dot:'plan'};
  const today = new Date().toISOString().slice(0,10);
  if(p.end && p.end < today) return {label:'Terlambat', cls:'bad', dot:'bad'};
  return {label:'On Progress', cls:'warn', dot:'warn'};
}

function renderSidebar(){
  const list = document.getElementById('projectList');
  if(!projects.length){
    list.innerHTML = '<div class="empty-state">Belum ada project.</div>';
    return;
  }
  const sorted = [...projects].sort((a,b)=>(a.end||'9999').localeCompare(b.end||'9999'));
  list.innerHTML = sorted.map(p=>{
    const st = statusInfo(p);
    const active = (p.id === activeId && view==='detail') ? 'active' : '';
    return `<li class="project-item ${active}" onclick="selectProject('${p.id}')">
      <div class="pname"><span class="status-dot dot-${st.dot}"></span>${escapeHtml(p.name)}
        <span class="prio-flag prio-${p.priority}">${p.priority[0]}</span>
      </div>
      <div class="pmeta">${computeProgress(p)}% · ${escapeHtml(p.owner||'-')}</div>
    </li>`;
  }).join('');
}

function selectProject(id){
  activeId = id;
  view = 'detail';
  document.getElementById('navOverview').classList.remove('active');
  document.getElementById('navMom').classList.remove('active');
  renderSidebar();
  renderDetail();
}

function showOverview(){
  view = 'overview';
  document.getElementById('navOverview').classList.add('active');
  document.getElementById('navMom').classList.remove('active');
  renderSidebar();
  renderOverview();
}

function showMomPage(){
  view = 'mom';
  momFormChecked = new Set();
  document.getElementById('navOverview').classList.remove('active');
  document.getElementById('navMom').classList.add('active');
  renderSidebar();
  renderMomPage();
}

function buildDonut(segments, total){
  if(!total) return `<svg width="120" height="120"></svg>`;
  const r = 46, cx = 60, cy = 60, circumference = 2 * Math.PI * r;
  let offset = 0;
  const arcs = segments.map(s=>{
    const frac = s.val / total;
    const dash = frac * circumference;
    const gap = circumference - dash;
    const el = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="16"
      stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset += dash;
    return el;
  }).join('');
  return `<svg width="120" height="120" viewBox="0 0 120 120">
    ${arcs}
    <text x="60" y="65" text-anchor="middle" font-size="20" font-weight="800" fill="var(--ink)">${total}</text>
  </svg>`;
}

function buildRing(pct){
  const r = 50, cx = 60, cy = 60, circumference = 2 * Math.PI * r;
  const dash = (pct/100) * circumference;
  return `<svg width="120" height="120" viewBox="0 0 120 120">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--bg)" stroke-width="12"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--accent)" stroke-width="12"
      stroke-dasharray="${dash} ${circumference-dash}" stroke-linecap="round"
      transform="rotate(-90 ${cx} ${cy})"/>
  </svg>
  <div class="ring-pct">${pct}%</div>
  <div class="ring-lbl">progress rata-rata</div>`;
}

function renderOverview(){
  const main = document.getElementById('mainPanel');
  if(!projects.length){
    main.innerHTML = `<div class="empty">Belum ada project. Klik "+ Project Baru" di sidebar untuk mulai tracking semua project kamu di sini.</div>`;
    return;
  }
  const total = projects.length;
  const completed = projects.filter(p=>statusInfo(p).label==='Completed').length;
  const onprogress = projects.filter(p=>statusInfo(p).label==='On Progress').length;
  const late = projects.filter(p=>statusInfo(p).label==='Terlambat').length;
  const high = projects.filter(p=>p.priority==='High').length;

  // data untuk visualisasi
  const statusColors = { 'Planning':'#41566B', 'On Progress':'#B8863B', 'Terlambat':'#A2493F', 'Completed':'#5C7A5B', 'On Hold':'#7A7566', 'Cancelled':'#7A7566' };
  const statusCounts = {};
  projects.forEach(p=>{ const l = statusInfo(p).label; statusCounts[l] = (statusCounts[l]||0)+1; });
  const donutSegments = Object.keys(statusCounts).map(k=>({label:k, val:statusCounts[k], color:statusColors[k]||'#8A8A82'}));
  const donutTotal = donutSegments.reduce((s,d)=>s+d.val,0);

  const prioColors = { High:'#A2493F', Medium:'#B8863B', Low:'#7A7566' };
  const prioCounts = { High:0, Medium:0, Low:0 };
  projects.forEach(p=>{ prioCounts[p.priority] = (prioCounts[p.priority]||0)+1; });
  const maxPrio = Math.max(1, ...Object.values(prioCounts));

  const avgProgress = Math.round(projects.reduce((s,p)=>s+computeProgress(p),0) / total);

  let list = projects.filter(p=>{
    if(filters.status && statusInfo(p).label !== filters.status) return false;
    if(filters.priority && p.priority !== filters.priority) return false;
    return true;
  }).sort((a,b)=>(a.end||'9999').localeCompare(b.end||'9999'));

  main.innerHTML = `
    <div class="ov-header">
      <h1>Semua Project</h1>
      <div class="sub">Ringkasan seluruh project yang sedang di-track</div>
    </div>

    <div class="stat-grid">
      <div class="stat-card"><div class="num">${total}</div><div class="lbl">Total Project</div></div>
      <div class="stat-card"><div class="num">${onprogress}</div><div class="lbl">On Progress</div></div>
      <div class="stat-card"><div class="num">${completed}</div><div class="lbl">Completed</div></div>
      <div class="stat-card"><div class="num">${late}</div><div class="lbl">Terlambat</div></div>
      <div class="stat-card"><div class="num">${high}</div><div class="lbl">Priority High</div></div>
    </div>

    <div class="chart-grid">
      <div class="chart-card">
        <h3>Distribusi Status</h3>
        <div class="chart-sub">Jumlah project per status</div>
        <div class="donut-wrap">
          ${buildDonut(donutSegments, donutTotal)}
          <div class="donut-legend">
            ${donutSegments.map(s=>`
              <div class="legend-row">
                <span class="legend-dot" style="background:${s.color}"></span>
                <span class="legend-name">${s.label}</span>
                <span class="legend-val">${s.val}</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>

      <div class="chart-card">
        <h3>Distribusi Priority</h3>
        <div class="chart-sub">Jumlah project per level priority</div>
        <div style="margin-top:18px;">
          ${['High','Medium','Low'].map(p=>`
            <div class="bar-chart-row">
              <div class="bar-label">${p}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${(prioCounts[p]/maxPrio*100)}%;background:${prioColors[p]}"></div></div>
              <div class="bar-val">${prioCounts[p]}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="chart-card">
        <h3>Rata-rata Progress</h3>
        <div class="chart-sub">Semua project digabung</div>
        <div class="ring-wrap">
          ${buildRing(avgProgress)}
        </div>
      </div>
    </div>

    <div class="filters">
      <select onchange="filters.status=this.value; renderOverview();">
        <option value="">Semua Status</option>
        ${['Planning','On Progress','On Hold','Completed','Cancelled','Terlambat'].map(s=>`<option value="${s}" ${filters.status===s?'selected':''}>${s}</option>`).join('')}
      </select>
      <select onchange="filters.priority=this.value; renderOverview();">
        <option value="">Semua Priority</option>
        <option value="High" ${filters.priority==='High'?'selected':''}>High</option>
        <option value="Medium" ${filters.priority==='Medium'?'selected':''}>Medium</option>
        <option value="Low" ${filters.priority==='Low'?'selected':''}>Low</option>
      </select>
    </div>

    <table class="grid-table">
      <thead>
        <tr>
          <th>Project</th><th>PIC</th><th>Priority</th><th>Status</th><th>Progress</th><th>Mulai</th><th>Target Selesai</th><th>MoM</th>
        </tr>
      </thead>
      <tbody>
        ${list.map(p=>{
          const st = statusInfo(p);
          const pct = computeProgress(p);
          return `<tr class="rowclick" onclick="selectProject('${p.id}')">
            <td class="name-cell">${escapeHtml(p.name)}</td>
            <td>${escapeHtml(p.owner||'-')}</td>
            <td><span class="prio-flag prio-${p.priority}">${p.priority}</span></td>
            <td><span class="badge badge-${st.cls}">${st.label}</span></td>
            <td><span class="mini-track"><span class="mini-fill" style="width:${pct}%"></span></span>${pct}%</td>
            <td>${fmtDate(p.start)}</td>
            <td>${fmtDate(p.end)}</td>
            <td>${moms.filter(m=>m.projectIds.includes(p.id)).length}</td>
          </tr>`;
        }).join('') || `<tr><td colspan="8" class="empty-state">Tidak ada project yang cocok dengan filter.</td></tr>`}
      </tbody>
    </table>
  `;
}

function renderDetail(){
  const p = projects.find(x=>x.id===activeId);
  const main = document.getElementById('mainPanel');
  if(!p){ showOverview(); return; }
  const st = statusInfo(p);
  const pct = computeProgress(p);
  const relatedMoms = moms.filter(m=>m.projectIds.includes(p.id));

  main.innerHTML = `
    <div class="header">
      <div>
        <h1>${escapeHtml(p.name)}</h1>
        <div class="sub">${escapeHtml(p.owner||'-')} &nbsp;·&nbsp; ${fmtDate(p.start)} → ${fmtDate(p.end)}</div>
      </div>
      <div class="header-actions">
        <span class="badge badge-${st.cls}">${st.label}</span>
        <span class="prio-flag prio-${p.priority}">${p.priority} Priority</span>
        <button class="icon-btn danger" onclick="deleteProject('${p.id}')">Hapus</button>
      </div>
    </div>

    <div class="card">
      <h3>Progress Keseluruhan</h3>
      <div class="progress-row">
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="pct">${pct}%</div>
      </div>
      <div class="stage-list">
        ${p.stages.map((s,i)=>`
          <div class="stage ${s.done?'done':''}">
            <div class="toggle ${s.done?'on':''}" onclick="toggleStage('${p.id}',${i})"></div>
            <div class="stage-name ${s.done?'done':''}">${escapeHtml(s.name)}</div>
            <button class="stage-del" onclick="deleteStage('${p.id}',${i})" title="Hapus tahap">✕</button>
          </div>
        `).join('')}
      </div>
      <div class="add-stage-row">
        <input id="newStageName_${p.id}" placeholder="Tambah tahapan baru...">
        <button onclick="addStage('${p.id}')">+ Tambah</button>
      </div>
    </div>

    <div class="card">
      <h3>Detail Project</h3>
      <div class="field-grid cols-3">
        <div class="field">
          <label>Tanggal Mulai</label>
          <input type="date" value="${p.start||''}" onchange="updateField('${p.id}','start',this.value)">
        </div>
        <div class="field">
          <label>Target Selesai</label>
          <input type="date" value="${p.end||''}" onchange="updateField('${p.id}','end',this.value)">
        </div>
        <div class="field">
          <label>PIC / Owner</label>
          <input value="${escapeHtml(p.owner||'')}" onchange="updateField('${p.id}','owner',this.value)">
        </div>
      </div>
      <div class="field-grid" style="margin-top:14px;">
        <div class="field">
          <label>Status</label>
          <select onchange="updateField('${p.id}','status',this.value)">
            ${STATUS_OPTS.map(s=>`<option value="${s}" ${p.status===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Priority</label>
          <div class="prio-toggle">
            ${['Low','Medium','High'].map(v=>`<button type="button" class="prio-btn sel-${v} ${p.priority===v?'selected':''}" onclick="updateField('${p.id}','priority','${v}')">${v}</button>`).join('')}
          </div>
        </div>
      </div>
      <div class="field" style="margin-top:14px;">
        <label>Catatan / Deskripsi</label>
        <textarea onchange="updateField('${p.id}','desc',this.value)" placeholder="Ringkasan singkat project...">${escapeHtml(p.desc||'')}</textarea>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <h3 style="margin:0;">Minutes of Meeting (MoM) Terkait</h3>
        <button class="icon-btn" onclick="goToMomForProject('${p.id}')">+ Kelola MoM</button>
      </div>
      ${relatedMoms.length ? relatedMoms.slice().reverse().map(m=>`
        <div class="mom-item">
          <div class="mom-head">
            <div class="mom-date">${fmtDate(m.date)}</div>
          </div>
          <div class="mom-text">${escapeHtml(m.text)}</div>
          <div class="tag-row">
            ${m.projectIds.map(pid=>{
              const rp = projects.find(x=>x.id===pid);
              return rp ? `<span class="tag-chip">${escapeHtml(rp.name)}</span>` : '';
            }).join('')}
          </div>
        </div>
      `).join('') : '<div class="empty-state">Belum ada MoM yang ditag ke project ini. Klik "Kelola MoM" untuk menambahkan.</div>'}
    </div>
  `;
}

function toggleStage(pid, idx){
  const p = projects.find(x=>x.id===pid);
  p.stages[idx].done = !p.stages[idx].done;
  saveData(); renderSidebar(); renderDetail();
}
function deleteStage(pid, idx){
  const p = projects.find(x=>x.id===pid);
  p.stages.splice(idx,1);
  saveData(); renderSidebar(); renderDetail();
}
function addStage(pid){
  const p = projects.find(x=>x.id===pid);
  const input = document.getElementById('newStageName_'+pid);
  const val = input.value.trim();
  if(!val) return;
  p.stages.push({name:val, done:false});
  saveData(); renderSidebar(); renderDetail();
}
function updateField(pid, key, val){
  const p = projects.find(x=>x.id===pid);
  p[key] = val;
  saveData(); renderSidebar(); renderDetail();
}
function goToMomForProject(pid){
  showMomPage();
  momFormChecked = new Set([pid]);
  renderMomPage();
  setTimeout(()=>{ document.getElementById('momFormCard')?.scrollIntoView({behavior:'smooth', block:'center'}); }, 50);
}

function toggleMomChip(pid){
  if(momFormChecked.has(pid)) momFormChecked.delete(pid);
  else momFormChecked.add(pid);
  renderMomPage();
}

function renderMomPage(){
  const main = document.getElementById('mainPanel');
  const filtered = momFilterProject
    ? moms.filter(m=>m.projectIds.includes(momFilterProject))
    : moms;
  const sorted = [...filtered].sort((a,b)=> (b.date||'').localeCompare(a.date||''));

  main.innerHTML = `
    <div class="ov-header">
      <h1>Minutes of Meeting</h1>
      <div class="sub">Semua catatan meeting, bisa ditag ke satu atau beberapa project sekaligus</div>
    </div>

    <div class="card" id="momFormCard">
      <h3>+ Tambah MoM Baru</h3>
      <div class="field-grid">
        <div class="field">
          <label>Tanggal Meeting</label>
          <input type="date" id="momDateInput" value="${new Date().toISOString().slice(0,10)}">
        </div>
      </div>
      <div class="field" style="margin-top:12px;">
        <label>Tag ke Project</label>
        ${projects.length ? `<div class="checkbox-list">
          ${projects.map(p=>`
            <label class="chk-item ${momFormChecked.has(p.id)?'checked':''}" onclick="event.preventDefault(); toggleMomChip('${p.id}')">
              <input type="checkbox" ${momFormChecked.has(p.id)?'checked':''} readonly>
              ${escapeHtml(p.name)}
            </label>
          `).join('')}
        </div>` : `<div class="empty-state">Belum ada project untuk ditag. Buat project dulu.</div>`}
      </div>
      <div class="field" style="margin-top:12px;">
        <label>Catatan</label>
        <textarea id="momTextInput" placeholder="Poin-poin diskusi, keputusan, action item..."></textarea>
      </div>
      <button class="primary-btn" style="margin-top:10px;" onclick="addMomGlobal()">+ Simpan MoM</button>
    </div>

    <div class="filters">
      <select onchange="momFilterProject=this.value; renderMomPage();">
        <option value="">Semua Project</option>
        ${projects.map(p=>`<option value="${p.id}" ${momFilterProject===p.id?'selected':''}>${escapeHtml(p.name)}</option>`).join('')}
      </select>
    </div>

    ${sorted.length ? sorted.map(m=>`
      <div class="mom-page-item">
        <div class="mom-head">
          <div class="mom-date">${fmtDate(m.date)}</div>
          <button class="mom-del" onclick="deleteMomGlobal('${m.id}')">Hapus</button>
        </div>
        <div class="mom-text">${escapeHtml(m.text)}</div>
        <div class="tag-row">
          ${m.projectIds.length ? m.projectIds.map(pid=>{
            const rp = projects.find(x=>x.id===pid);
            return rp ? `<span class="tag-chip clickable" onclick="selectProject('${rp.id}')">${escapeHtml(rp.name)}</span>` : '';
          }).join('') : '<span class="no-tag">Tidak ditag ke project manapun</span>'}
        </div>
      </div>
    `).join('') : `<div class="empty-state">Belum ada MoM${momFilterProject?' untuk project ini':''}.</div>`}
  `;
}

function addMomGlobal(){
  const date = document.getElementById('momDateInput').value;
  const text = document.getElementById('momTextInput').value.trim();
  if(!text){ alert('Catatan MoM tidak boleh kosong'); return; }
  moms.push({ id: uid('m'), date, text, projectIds: Array.from(momFormChecked) });
  momFormChecked = new Set();
  saveData();
  renderSidebar();
  renderMomPage();
}

function deleteMomGlobal(mid){
  moms = moms.filter(m=>m.id!==mid);
  saveData();
  renderMomPage();
}
function deleteProject(pid){
  if(!confirm('Hapus project ini? MoM yang pernah ditag ke project ini akan tetap ada, hanya tag-nya yang dilepas.')) return;
  projects = projects.filter(p=>p.id!==pid);
  moms.forEach(m=>{ m.projectIds = m.projectIds.filter(id=>id!==pid); });
  if(activeId===pid){ activeId=null; showOverview(); }
  else { renderSidebar(); }
  saveData();
}

function selectNewPrio(v){
  newProjPrio = v;
  document.querySelectorAll('#newProjPrio .prio-btn').forEach(b=>{
    b.classList.toggle('selected', b.dataset.val===v);
  });
}
function openNewProjectModal(){
  document.getElementById('newProjName').value = '';
  document.getElementById('newProjOwner').value = '';
  document.getElementById('newProjStart').value = new Date().toISOString().slice(0,10);
  document.getElementById('newProjEnd').value = '';
  newProjPrio = 'Medium';
  selectNewPrio('Medium');
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }

function createProject(){
  const name = document.getElementById('newProjName').value.trim();
  if(!name){ alert('Nama project wajib diisi'); return; }
  const p = {
    id: uid(),
    name,
    owner: document.getElementById('newProjOwner').value.trim(),
    start: document.getElementById('newProjStart').value,
    end: document.getElementById('newProjEnd').value,
    priority: newProjPrio,
    status: 'Planning',
    desc: '',
    stages: DEFAULT_STAGES.map(s=>({name:s, done:false}))
  };
  projects.push(p);
  activeId = p.id;
  view = 'detail';
  saveData();
  closeModal();
  document.getElementById('navOverview').classList.remove('active');
  renderSidebar();
  renderDetail();
}

function fmtDate(d){
  if(!d) return '-';
  const dt = new Date(d+'T00:00:00');
  if(isNaN(dt)) return d;
  return dt.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
}
function escapeHtml(str){
  return (str||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

loadData();
</script>
</body>
</html>
